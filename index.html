<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Carta na Névoa - Silent Hill</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            color: #d0d0d0;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === FUNDO COM IMAGEM === */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: url('background.png.png') center/cover no-repeat;
            background-attachment: fixed;
        }

        /* Sobreposição para melhorar legibilidade da carta */
        .background-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        /* Remove a estrutura distante */
        .background-container::after {
            display: none;
        }

        .silhouette {
            position: absolute;
            bottom: 0;
            z-index: 3;
            display: none;
        }

        .silhouette-male {
            display: none;
        }

        .silhouette-female {
            display: none;
        }

        /* === NÉVOA ANIMADA === */
        .fog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .fog::before,
        .fog::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
        }

        .fog::before {
            background: radial-gradient(ellipse at 20% 50%, rgba(200, 200, 200, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(150, 150, 150, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 40% 20%, rgba(180, 180, 180, 0.12) 0%, transparent 50%);
            animation: fog-drift 20s ease-in-out infinite;
        }

        .fog::after {
            background: radial-gradient(ellipse at 60% 40%, rgba(160, 160, 160, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 30% 70%, rgba(190, 190, 190, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 30%, rgba(140, 140, 140, 0.09) 0%, transparent 50%);
            animation: fog-drift-reverse 25s ease-in-out infinite;
        }

        @keyframes fog-drift {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(50px, 30px);
            }
        }

        @keyframes fog-drift-reverse {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(-50px, -30px);
            }
        }

        /* === TELA INTRO === */
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: bold;
            letter-spacing: 8px;
            color: #8b0000;
            text-shadow: 0 0 30px rgba(139, 0, 0, 0.8),
                         0 0 60px rgba(139, 0, 0, 0.4);
            margin-bottom: 40px;
            animation: logo-pulse 2s ease-in-out infinite;
            font-family: 'Arial Black', sans-serif;
        }

        @keyframes logo-pulse {
            0%, 100% {
                text-shadow: 0 0 30px rgba(139, 0, 0, 0.8),
                             0 0 60px rgba(139, 0, 0, 0.4);
            }
            50% {
                text-shadow: 0 0 40px rgba(139, 0, 0, 1),
                             0 0 80px rgba(139, 0, 0, 0.6);
            }
        }

        .loading {
            font-size: 1.2rem;
            color: #a0a0a0;
            letter-spacing: 2px;
            animation: loading-text 1.5s ease-in-out infinite;
        }

        @keyframes loading-text {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* === CARTA === */
        .letter {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 800px;
            opacity: 0;
            transition: opacity 0.5s ease-in;
            max-height: 90vh;
            overflow-y: auto;
        }

        .paper {
            background: linear-gradient(135deg, #f5f1e8 0%, #ede7da 100%);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 2px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3),
                        0 0 40px rgba(139, 0, 0, 0.15);
            position: relative;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px
                );
        }

        .paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 0, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(100, 0, 0, 0.03) 0%, transparent 50%);
            border-radius: 2px;
            pointer-events: none;
        }

        .title {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: bold;
            color: #3d2817;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        }

        #text {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #0a0a0a;
            min-height: 300px;
            text-align: justify;
            font-family: 'Georgia', serif;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        #text::after {
            content: '|';
            animation: cursor-blink 0.8s infinite;
            color: #8b0000;
            font-weight: bold;
        }

        @keyframes cursor-blink {
            0%, 50% {
                opacity: 1;
            }
            51%, 100% {
                opacity: 0;
            }
        }

        /* === CONTROLE DE MÚSICA === */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .music-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(139, 0, 0, 0.7);
            border: 2px solid #8b0000;
            color: #f5f1e8;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
        }

        .music-btn:hover {
            background: rgba(139, 0, 0, 0.9);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.6);
            transform: scale(1.1);
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        .music-tooltip {
            position: absolute;
            bottom: 70px;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: #f5f1e8;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .music-btn:hover .music-tooltip {
            opacity: 1;
        }

        #bgMusic {
            display: none;
        }

        /* === SCROLL RESPONSIVO === */
        .letter::-webkit-scrollbar {
            width: 8px;
        }

        .letter::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        .letter::-webkit-scrollbar-thumb {
            background: rgba(139, 0, 0, 0.5);
            border-radius: 4px;
        }

        .letter::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 0, 0, 0.7);
        }

        /* === MEDIA QUERIES - RESPONSIVO === */
        @media (max-width: 768px) {
            .silhouette-male {
                width: 120px;
                height: 250px;
            }

            .silhouette-female {
                width: 110px;
                height: 240px;
            }

            .logo {
                letter-spacing: 4px;
            }

            .loading {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            .paper {
                padding: clamp(15px, 4vw, 25px);
            }

            .music-btn {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
                bottom: 15px;
                right: 15px;
            }

            .music-tooltip {
                bottom: 60px;
            }
        }

        @media (max-width: 480px) {
            .silhouette-male {
                left: 2%;
                width: 80px;
                height: 180px;
                opacity: 0.08;
            }

            .silhouette-female {
                right: 2%;
                width: 70px;
                height: 170px;
                opacity: 0.08;
            }

            .logo {
                letter-spacing: 2px;
                margin-bottom: 25px;
            }

            #text {
                min-height: 200px;
                line-height: 1.6;
            }

            .music-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                bottom: 10px;
                right: 10px;
            }

            .music-tooltip {
                font-size: 0.75rem;
                bottom: 50px;
            }
        }

        /* === ANIMAÇÃO DE ENTRADA === */
        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .letter.show {
            animation: fade-in 0.5s ease-in;
        }
    </style>
</head>
<body>
    <!-- FUNDO COM SILHUETAS -->
    <div class="background-container">
        <div class="silhouette silhouette-male"></div>
        <div class="silhouette silhouette-female"></div>
    </div>

    <!-- NÉVOA ANIMADA -->
    <div class="fog"></div>

    <!-- TELA INICIAL -->
    <div id="intro" class="intro">
        <div class="logo">SILENT HILL</div>
        <div class="loading">Procurando memórias...</div>
    </div>

    <!-- CARTA -->
    <div id="letter" class="letter">
        <div class="paper">
            <div class="title">Uma Carta Encontrada na Névoa</div>
            <div id="text"></div>
        </div>
    </div>

    <!-- CONTROLE DE MÚSICA -->
    <div class="music-control">
        <button class="music-btn" id="musicBtn" aria-label="Ativar música de fundo">
            <span>🔊</span>
            <div class="music-tooltip">Clique para ativar música</div>
        </button>
    </div>

    <!-- ÁUDIO -->
    <audio id="bgMusic" loop preload="none">
        <!-- Theme Of Laura - Silent Hill 2 Remake OST -->
        <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_3b0bc3cb55.mp3?filename=mysterious-movie-intro-2992.mp3" type="audio/mpeg">
    </audio>

    <script>
        // === TEXTO DA CARTA ===
        const carta = `Para meu querido Denis,

Se você está lendo esta carta,
significa que mais um ano passou.

É estranho como o tempo funciona.
Algumas lembranças desaparecem na névoa,
enquanto outras permanecem tão vivas
quanto no dia em que nasceram.

Ao longo dos anos, colecionamos momentos
que talvez pareçam simples para outras pessoas.

Conversas, risadas, histórias compartilhadas
e pequenas lembranças que, sem perceber,
se tornaram parte de quem somos.

Hoje é seu aniversário.

E entre todas as coisas que eu poderia desejar,
desejo que você continue encontrando motivos
para seguir em frente.

Mesmo quando o caminho parecer incerto.

Que os dias difíceis sejam apenas corredores
pelos quais você passa.

Nunca lugares onde você fique preso.

Que seus sonhos encontrem espaço para crescer.

Que as pessoas certas permaneçam ao seu lado.

E que você nunca perca aquilo
que faz de você quem você é.

Existem lugares que deixam marcas para sempre.

Existem histórias que jamais esquecemos.

E existem amizades que resistem ao tempo.

Obrigado por fazer parte
das minhas memórias favoritas.

Quando olhar para trás daqui a muitos anos,
espero que encontre muito mais motivos para sorrir
do que para sentir saudade.

Até lá...

Continue caminhando.

Mesmo através da névoa.

Amo você.

Nos vemos na névoa,

— Day

🎂 FELIZ ANIVERSÁRIO 🎂

"Algumas memórias não devem ser esquecidas."`;

        const areaTexto = document.getElementById('text');
        const introDiv = document.getElementById('intro');
        const letterDiv = document.getElementById('letter');
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let musicPlaying = false;

        // === ANIMAÇÃO DE DIGITAÇÃO ===
        function escreverTexto() {
            let i = 0;

            const maquina = setInterval(() => {
                areaTexto.textContent = carta.substring(0, i);
                i++;

                if (i > carta.length) {
                    clearInterval(maquina);
                }
            }, 40);
        }

        // === TRANSIÇÃO INTRO → CARTA ===
        setTimeout(() => {
            introDiv.style.display = 'none';
            letterDiv.style.opacity = '1';
            letterDiv.classList.add('show');
            escreverTexto();
        }, 4000);

        // === CONTROLE DE MÚSICA ===
        musicBtn.addEventListener('click', () => {
            if (musicPlaying) {
                bgMusic.pause();
                musicBtn.innerHTML = '<span>�</span><div class="music-tooltip">Clique para ativar música</div>';
                musicPlaying = false;
            } else {
                bgMusic.play().catch((error) => {
                    console.log('Erro ao reproduzir áudio:', error);
                    alert('Não foi possível reproduzir a música. Verifique a conexão de internet.');
                });
                musicBtn.innerHTML = '<span>🔊</span><div class="music-tooltip">Clique para desativar música</div>';
                musicPlaying = true;
            }
        });

        // === SUPORTE A TECLADO (ESC para parar música) ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (musicPlaying) {
                    bgMusic.pause();
                    musicBtn.innerHTML = '<span>�</span><div class="music-tooltip">Clique para ativar música</div>';
                    musicPlaying = false;
                }
            }
        });
    </script>
</body>
</html>
